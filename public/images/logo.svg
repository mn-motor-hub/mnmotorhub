<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Background Texture/Gradient mapping to match logo_2.jpg -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181D20" />
      <stop offset="50%" stop-color="#111416" />
      <stop offset="100%" stop-color="#0B0D0E" />
    </linearGradient>

    <!-- Orange Outer Glow and Solid Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6A1A" />
      <stop offset="60%" stop-color="#FF4F00" />
      <stop offset="100%" stop-color="#D63F00" />
    </linearGradient>

    <!-- Metal Bezel Gradients mimicking the brushed metallic flow -->
    <linearGradient id="metalBezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BDC3C7" />
      <stop offset="25%" stop-color="#E5E8E8" />
      <stop offset="50%" stop-color="#95A5A6" />
      <stop offset="75%" stop-color="#EAEDED" />
      <stop offset="100%" stop-color="#7F8C8D" />
    </linearGradient>

    <linearGradient id="metalText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#D5DBDB" />
      <stop offset="70%" stop-color="#95A5A6" />
      <stop offset="100%" stop-color="#566573" />
    </linearGradient>

    <linearGradient id="screwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAEDED" />
      <stop offset="50%" stop-color="#7F8C8D" />
      <stop offset="100%" stop-color="#424949" />
    </linearGradient>

    <!-- Carbon Fiber Pattern Definition -->
    <pattern id="carbonFiber" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#15191B" />
      <path d="M0,0 L6,0 L6,6 L0,6 Z" fill="#1C2224" />
      <path d="M6,6 L12,6 L12,12 L6,12 Z" fill="#1C2224" />
      <path d="M0,3 L3,0 L6,3 L3,6 Z" fill="#252D30" />
      <path d="M6,9 L9,6 L12,9 L9,12 Z" fill="#252D30" />
    </pattern>

    <!-- Critical shadow depths built purely with paths, but enhanced via local filters for exact replicas -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feOffset dx="0" dy="4"/>
      <feComposite operator="out" in2="SourceAlpha" result="inverse"/>
      <feFlood flood-color="black" result="color"/>
      <feComposite operator="in" in2="inverse" result="shadow"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="1000" height="1000" fill="url(#bgGrad)" />

  <!-- 3D Shadow Backdrop Overlay for main Hexagon -->
  <polygon points="500,145 870,358 870,785 500,998 130,785 130,358" fill="#000000" opacity="0.6" filter="url(#dropShadow)" />

  <!-- Layer 1: Outer Orange Hexagon Structure -->
  <g id="OuterOrangeStructure">
    <!-- Base Bevel Edge -->
    <polygon points="500,120 880,340 880,780 500,1000 120,780 120,340" fill="#9E2B00" />
    <!-- Main Orange Body -->
    <polygon points="500,125 872,343 872,775 500,992 128,775 128,343" fill="url(#orangeGrad)" />
    <!-- Inner Orange Rim Shadow -->
    <polygon points="500,145 852,352 852,760 500,968 148,760 148,352" fill="#661C00" />
  </g>

  <!-- Layer 2: Metallic Silver Hexagonal Bezel Plate -->
  <g id="MetallicSilverBezel">
    <!-- Dark Outlining Base -->
    <polygon points="500,148 854,354 854,758 500,964 146,758 146,354" fill="#2C3E50" />
    <!-- Main Brushed Body -->
    <polygon points="500,154 846,358 846,752 500,956 154,752 154,358" fill="url(#metalBezel)" />
    <!-- Light Highlight Inner Facet -->
    <polygon points="500,164 836,362 836,744 500,942 164,744 164,362" fill="#BDC3C7" />
    <polygon points="500,172 828,366 828,736 500,930 172,736 172,366" fill="#7F8C8D" />
    <!-- Bright White Specular Rim Edge -->
    <polygon points="500,154 846,358 500,164" fill="#FFFFFF" opacity="0.4" />
    <polygon points="154,752 154,358 164,362" fill="#FFFFFF" opacity="0.3" />
  </g>

  <!-- Layer 3: Inner Orange Core Rim & Shadow Basin -->
  <g id="InnerOrangeRim">
    <polygon points="500,206 804,382 804,720 500,896 196,720 196,382" fill="#3D1100" />
    <polygon points="500,210 800,385 800,715 500,890 200,715 200,385" fill="url(#orangeGrad)" />
    <polygon points="500,224 786,393 786,703 500,872 214,703 214,393" fill="#111517" />
  </g>

  <!-- Layer 4: Carbon Fiber Core Surface -->
  <g id="CarbonFiberCore">
    <polygon points="500,228 782,395 782,701 500,868 218,701 218,395" fill="url(#carbonFiber)" />
    <!-- Inner Ambient Occlusion Shadow Masking -->
    <polygon points="500,228 782,395 782,701 500,868 218,701 218,395" fill="black" opacity="0.4" filter="url(#innerShadow)" />
  </g>

  <!-- Layer 5: Industrial Screws / Bolts Assembly (Exact Placement) -->
  <g id="IndustrialScrews">
    <!-- Top Screw (500, 182) -->
    <circle cx="500" cy="182" r="18" fill="#424949" />
    <circle cx="500" cy="182" r="15" fill="url(#screwGrad)" />
    <circle cx="500" cy="182" r="10" fill="#232727" />
    <circle cx="500" cy="182" r="6" fill="#7F8C8D" />

    <!-- Top Right Screw (814, 364) -->
    <circle cx="814" cy="364" r="18" fill="#424949" />
    <circle cx="814" cy="364" r="15" fill="url(#screwGrad)" />
    <circle cx="814" cy="364" r="10" fill="#232727" />
    <circle cx="814" cy="364" r="6" fill="#7F8C8D" />

    <!-- Bottom Right Screw (814, 746) -->
    <circle cx="814" cy="746" r="18" fill="#424949" />
    <circle cx="814" cy="746" r="15" fill="url(#screwGrad)" />
    <circle cx="814" cy="746" r="10" fill="#232727" />
    <circle cx="814" cy="746" r="6" fill="#7F8C8D" />

    <!-- Bottom Screw (500, 928) -->
    <circle cx="500" cy="928" r="18" fill="#424949" />
    <circle cx="500" cy="928" r="15" fill="url(#screwGrad)" />
    <circle cx="500" cy="928" r="10" fill="#232727" />
    <circle cx="500" cy="928" r="6" fill="#7F8C8D" />

    <!-- Bottom Left Screw (186, 746) -->
    <circle cx="186" cy="746" r="18" fill="#424949" />
    <circle cx="186" cy="746" r="15" fill="url(#screwGrad)" />
    <circle cx="186" cy="746" r="10" fill="#232727" />
    <circle cx="186" cy="746" r="6" fill="#7F8C8D" />

    <!-- Top Left Screw (186, 364) -->
    <circle cx="186" cy="364" r="18" fill="#424949" />
    <circle cx="186" cy="364" r="15" fill="url(#screwGrad)" />
    <circle cx="186" cy="364" r="10" fill="#232727" />
    <circle cx="186" cy="364" r="6" fill="#7F8C8D" />
  </g>

  <!-- Layer 6: Main Logotype Geometry (MN) -->
  <g id="Logotype-MN">
    <!-- Under-shadows for text extrusion -->
    <path d="M 310,360 L 310,570 L 375,570 L 375,445 L 440,570 L 490,570 L 490,360 L 435,360 L 435,485 L 365,360 Z" fill="#050708" transform="translate(0, 10)" />
    <path d="M 510,360 L 510,570 L 575,570 L 575,445 L 640,570 L 690,570 L 690,360 L 635,360 L 635,485 L 565,360 Z" fill="#050708" transform="translate(0, 10)" />

    <!-- Letter M Body -->
    <path d="M 310,360 L 310,570 L 375,570 L 375,445 L 440,570 L 490,570 L 490,360 L 435,360 L 435,485 L 365,360 Z" fill="url(#metalText)" />
    
    <!-- Letter N Body -->
    <path d="M 510,360 L 510,570 L 575,570 L 575,445 L 640,570 L 690,570 L 690,360 L 635,360 L 635,485 L 565,360 Z" fill="url(#metalText)" />

    <!-- Pure Precision Geometric Overlays for Edge Highlights on Typography -->
    <path d="M 310,360 L 490,360 L 435,380 L 365,380 Z" fill="#FFFFFF" opacity="0.4" />
    <path d="M 510,360 L 690,360 L 635,380 L 565,380 Z" fill="#FFFFFF" opacity="0.4" />
  </g>

  <!-- Layer 7: High-Performance Brake Caliper Integration -->
  <g id="BrakeCaliperDynamic">
    <!-- Dark Caliper Silhouette Backing for Depth -->
    <path d="M 495,350 C 490,360 492,380 492,390 C 492,405 496,415 494,430 C 492,445 488,455 490,470 C 492,485 497,495 495,510 C 493,525 491,540 499,565 C 504,575 515,570 522,560 C 532,545 540,520 540,490 C 540,450 535,410 522,375 C 515,355 505,345 495,350 Z" fill="#0A0200" transform="translate(2, 4)" />
    
    <!-- Main Caliper Body Solid Base -->
    <path d="M 495,350 C 490,360 492,380 492,390 C 492,405 496,415 494,430 C 492,445 488,455 490,470 C 492,485 497,495 495,510 C 493,525 491,540 499,565 C 504,575 515,570 522,560 C 532,545 540,520 540,490 C 540,450 535,410 522,375 C 515,355 505,345 495,350 Z" fill="url(#orangeGrad)" />

    <!-- Caliper Mechanical Pistons and Architecture Segments (Piston Ridges) -->
    <path d="M 515,385 C 518,390 525,395 528,405 C 530,412 525,420 518,418" fill="none" stroke="#2C3E50" stroke-width="3" />
    <path d="M 518,430 C 522,435 528,440 532,450 C 534,457 528,465 522,463" fill="none" stroke="#2C3E50" stroke-width="3" />
    <path d="M 516,475 C 520,480 526,485 530,495 C 532,502 526,510 520,508" fill="none" stroke="#2C3E50" stroke-width="3" />

    <!-- Caliper Bolts / Hardware Detail -->
    <circle cx="505" cy="370" r="3" fill="#BDC3C7" />
    <circle cx="512" cy="545" r="3" fill="#BDC3C7" />
    
    <!-- Inner Brake Pad/Rotor Separation Line (Dark Center Divide) -->
    <path d="M 494,360 L 494,555" stroke="#111416" stroke-width="4" stroke-linecap="round" />
    
    <!-- Specular Highlight Curve -->
    <path d="M 502,360 C 498,380 500,410 498,440 C 496,470 498,510 504,545" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Layer 8: MOTOR HUB Core Branding Typography -->
  <g id="Logotype-MotorHub">
    <!-- Drop Shadow representation for structural readability -->
    <text x="502" y="658" font-family="Oswald, Impact, sans-serif" font-size="68" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="4">MOTOR HUB</text>

    <!-- Main Metallic Text Render -->
    <text x="500" y="655" font-family="Oswald, Impact, sans-serif" font-size="68" font-weight="900" fill="url(#metalText)" text-anchor="middle" letter-spacing="4">MOTOR HUB</text>
    
    <!-- Precise Character Clean Vector Edge Tracing Overlays for Anti-Aliasing Control -->
    <path d="M 276,605 L 294,655 L 306,655 L 314,625 L 322,655 L 334,655 L 352,605 L 338,605 L 328,640 L 320,605 L 308,605 L 300,640 L 290,605 Z" fill="#E5E8E8" opacity="0.1" />
  </g>
</svg>
